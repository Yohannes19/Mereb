            <div class="col-md-4 col-lg-3 col-xl-2 sidebar-container">
                <div class="glass-card p-4 h-100 position-sticky" style="top: 100px;">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="rounded-circle overflow-hidden shadow-sm"
                            style="width: 48px; height: 48px; background: linear-gradient(135deg, #e2e8f0, #cbd5e1); border: 2px solid white;">
                        </div>
                        <div>
                            <p class="fw-bold mb-0 text-truncate" style="max-width: 120px;">{{ profile.display_name }}
                            </p>
                            <span class="badge badge-creative rounded-pill mt-1 py-1 px-2"
                                style="font-size: 0.65rem;">{{ profile.profile_type|title }}</span>
                        </div>
                    </div>

                    <hr class="my-4" style="border-color: var(--pp-border-strong);">

                    <nav class="nav nav-pills flex-column gap-2 pp-clean-tabs" id="dashboardTabs" role="tablist">
                        <button
                            class="nav-link w-100 text-start d-flex align-items-center gap-2 {% if not request.query_params.get('proof') and not request.query_params.get('rating') %}active{% endif %}"
                            style="border: none !important; border-radius: var(--pp-rad-sm);" id="pills-profile-tab"
                            data-bs-toggle="tab" data-bs-target="#pills-profile" type="button" role="tab">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <span class="lang-text" data-en="Profile" data-am="መገለጫ">Profile</span>
                        </button>
                        <button
                            class="nav-link w-100 text-start d-flex align-items-center gap-2 {% if request.query_params.get('proof') %}active{% endif %}"
                            style="border: none !important; border-radius: var(--pp-rad-sm);" id="pills-proof-tab"
                            data-bs-toggle="tab" data-bs-target="#pills-proof" type="button" role="tab">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                                </path>
                            </svg>
                            <span class="lang-text" data-en="Portfolio" data-am="ፖርትፎሊዮ">Portfolio</span>
                        </button>
                        <button
                            class="nav-link w-100 text-start d-flex align-items-center gap-2 {% if request.query_params.get('rating') %}active{% endif %}"
                            style="border: none !important; border-radius: var(--pp-rad-sm);" id="pills-rating-tab"
                            data-bs-toggle="tab" data-bs-target="#pills-rating" type="button" role="tab">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z">
                                </path>
                            </svg>
                            <span class="lang-text" data-en="Testimonials" data-am="ምስክርነት">Testimonials</span>
                        </button>
                        <button class="nav-link w-100 text-start d-flex align-items-center gap-2"
                            style="border: none !important; border-radius: var(--pp-rad-sm);" id="pills-feed-tab"
                            data-bs-toggle="tab" data-bs-target="#pills-feed" type="button" role="tab">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                            </svg>
                            <span class="lang-text" data-en="Activity" data-am="እንቅስቃሴ">Activity</span>
                        </button>
                    </nav>

                    <style>
                        .pp-clean-tabs .nav-link.active {
                            background: var(--pp-gradient-main) !important;
                            color: var(--pp-ink-dark) !important;
                            box-shadow: var(--pp-shadow-md);
                        }

                        .pp-clean-tabs .nav-link svg {
                            flex-shrink: 0 !important;
                            width: 16px !important;
                            height: 16px !important;
                            min-width: 16px !important;
                            display: inline-block !important;
                        }
                    </style>

                    <!-- Mini Stats in Sidebar -->
                    <div class="mt-5 pt-3 border-top" style="border-color: var(--pp-border-strong) !important;">
                        <p class="text-uppercase small fw-bold text-muted mb-3 lang-text" style="letter-spacing: 0.1em;"
                            data-en="Quick Stats" data-am="ፈጣን መረጃ">Quick Stats</p>
                        <div class="d-flex flex-column gap-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="small fw-medium text-muted lang-text" data-en="Projects"
                                    data-am="ስራዎች">Projects</span>
                                <span
                                    class="badge bg-white text-dark shadow-sm border border-light rounded-pill px-2 py-1">{{
                                    metrics.proof_count }}</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="small fw-medium text-muted lang-text" data-en="Reviews"
                                    data-am="አስተያየቶች">Reviews</span>
                                <span
                                    class="badge bg-white text-dark shadow-sm border border-light rounded-pill px-2 py-1">{{
                                    metrics.rating_count }}</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="small fw-medium text-muted lang-text" data-en="Avg Rating"
                                    data-am="አማካይ ደረጃ">Avg Rating</span>
                                <span
                                    class="badge bg-white text-dark shadow-sm border border-light rounded-pill px-2 py-1">{{
                                    metrics.average_rating }} ★</span>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="small fw-medium text-muted lang-text" data-en="Profile Views"
                                    data-am="የገጽ እይታ">Profile Views</span>
                                <span
                                    class="badge bg-white text-dark shadow-sm border border-light rounded-pill px-2 py-1">{{
                                    profile.view_count }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Invite a Creator (Viral Growth) -->
                    <div class="mt-4 pt-4 border-top" style="border-color: var(--pp-border-strong) !important;">
                        <p class="text-uppercase small fw-bold text-muted mb-3 lang-text" style="letter-spacing: 0.1em;"
                            data-en="Grow Mereb" data-am="መረብን ያሳድጉ">Grow Mereb</p>
                        <div class="glass-card p-3"
                            style="background: rgba(var(--pp-brand-1-rgb), 0.05); border: 1px dashed var(--pp-brand-1);">
                            <p class="small fw-semibold mb-2 lang-text" data-en="Invite a creator" data-am="ጓደኛን ይጋብዙ">
                                Invite a creator</p>
                            <button type="button" class="btn btn-primary btn-sm w-100 rounded-pill shadow-sm lang-text"
                                id="inviteCreatorBtn" data-en="Share Invite" data-am="ግብዣ ላክ">Share Invite</button>
                        </div>
                    </div>
                </div>
            </div>
