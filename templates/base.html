<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6e56ff">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-512.png">
    <title>{% block title %}Mereb{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block body %}{% endblock %}

    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Amharic/English Language Toggle System -->
    <script>
        function toggleLanguage() {
            const currentLang = localStorage.getItem('rateMeLang') || 'en';
            const newLang = currentLang === 'en' ? 'am' : 'en';
            setLanguage(newLang);
        }
        function setLanguage(lang) {
            localStorage.setItem('rateMeLang', lang);
            document.documentElement.lang = lang;
            document.querySelectorAll('.lang-text').forEach(el => {
                if(el.hasAttribute('data-' + lang)) {
                    el.innerHTML = el.getAttribute('data-' + lang);
                }
            });
            document.querySelectorAll('.lang-toggle-btn').forEach(btn => {
                btn.innerHTML = lang === 'en' ? '🇪🇹 አማርኛ' : '🇺🇸 English';
            });
        }
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('rateMeLang') || 'en';
            setLanguage(savedLang);
        });

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then(reg => console.log('Mereb PWA Registered'))
                    .catch(err => console.log('PWA Registration Failed', err));
            });
        }
    </script>
</body>
</html>
